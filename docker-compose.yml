services:
  db:
    image: postgres:16-alpine 
    container_name: arena_db
    restart: always
    ports:
      - "${PSQL_FORWARDED_PORT}:${PSQL_PORT}"
    environment:
      POSTGRES_USER: ${PSQL_USER}
      POSTGRES_PASSWORD: ${PSQL_PASSWORD}
      POSTGRES_DB: ${PSQL_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: arena_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  app: # <-- Sekarang sudah benar di bawah services
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arena_ban_app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app:Z 
    environment:
      DB_HOST: db 
      DB_PORT: ${PSQL_PORT}
      DB_USER: ${PSQL_USER}
      DB_PASSWORD: ${PSQL_PASSWORD}
      DB_NAME: ${PSQL_DB_NAME}
      REDIS_HOST: redis 
      REDIS_PORT: 6379 
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data: